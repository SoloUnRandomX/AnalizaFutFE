<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AnalizaFut 🧠</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .tabs { margin-bottom: 20px; display: flex; gap: 10px; }
        .tab-btn { background: #334155; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .tab-btn:hover { background: #3b82f6; }
        .card { background-color: var(--card-bg); width: 100%; max-width: 500px; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .equipos-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .team-box { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; text-align: center; }
        .logo-team { width: 40px; height: 40px; object-fit: contain; }
        .marcador { text-align: center; margin-top: 10px; font-weight: bold; color: #60a5fa; padding: 8px; border: 1px dashed #60a5fa; border-radius: 6px; }
        .live { color: #ef4444 !important; border-color: #ef4444 !important; border-style: solid !important; }
    </style>
</head>
<body>
    <h1>AnalizaFut 🧠</h1>
    <div class="tabs">
        <button class="tab-btn" onclick="cargar('WC')">Selecciones 🌍</button>
        <button class="tab-btn" onclick="cargar('CL')">Clubes 🏆</button>
    </div>
    <div id="contenedor">Haz clic en una categoría...</div>

    <script>
        const API_URL = "https://analizafut.onrender.com/api/predicciones";

        async function cargar(compCode) {
            const cont = document.getElementById("contenedor");
            cont.innerHTML = "Cargando...";

            try {
                const res = await fetch(`${API_URL}?comp=${compCode}`);
                const data = await res.json();
                
                // FILTRO: Solo partidos de HOY (ajustado a tu hora local)
                const hoy = new Date().toDateString();
                const filtrados = data.filter(m => new Date(m.utcDate).toDateString() === hoy);
                
                cont.innerHTML = filtrados.length === 0 ? "No hay partidos hoy." : "";

                filtrados.forEach(m => {
                    const card = document.createElement("div");
                    card.className = "card";
                    
                    // Lógica de visualización por estado
                    let cuerpo = "";
                    if (m.status === 'FINISHED') {
                        cuerpo = `<div class="marcador" style="border-color:#10b981; color:#10b981;">🏁 Final: ${m.score.fullTime.home} - ${m.score.fullTime.away}</div>`;
                    } else if (m.status === 'IN_PLAY' || m.status === 'PAUSED') {
                        cuerpo = `<div class="marcador live">🔴 En Vivo: ${m.score.fullTime.home} - ${m.score.fullTime.away}</div>`;
                    } else {
                        cuerpo = `<div class="marcador">🎯 Pronóstico: ${m.prediccion.score} | Gana local: ${m.prediccion.percent.home}%</div>`;
                    }

                    card.innerHTML = `
                        <div class="equipos-row">
                            <div class="team-box"><img class="logo-team" src="${m.teams.home.crest}" onerror="this.style.display='none'"><span>${m.teams.home.name}</span></div>
                            <div style="font-weight:bold; color:#64748b">VS</div>
                            <div class="team-box"><img class="logo-team" src="${m.teams.away.crest}" onerror="this.style.display='none'"><span>${m.teams.away.name}</span></div>
                        </div>
                        ${cuerpo}`;
                    cont.appendChild(card);
                });
            } catch (e) { cont.innerHTML = "Error al cargar."; }
        }
    </script>
</body>
</html>
