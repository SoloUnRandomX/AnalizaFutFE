<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AnalizaFut 🧠</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background-color: var(--card-bg); width: 100%; max-width: 500px; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .equipos-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; }
        .bar-wrapper { height: 30px; background: #0f172a; margin: 6px 0; border-radius: 5px; overflow: hidden; position: relative; display: flex; align-items: center; }
        .bar-fill { height: 100%; transition: width 0.6s ease; }
        .home { background: rgba(16, 185, 129, 0.4); }
        .draw { background: rgba(100, 116, 139, 0.4); }
        .away { background: rgba(59, 130, 246, 0.4); }
        .bar-text { position: absolute; padding: 0 10px; font-size: 0.8rem; width: 100%; display: flex; justify-content: space-between; }
        .marcador { text-align: center; margin-top: 15px; font-weight: bold; color: #60a5fa; padding: 8px; border: 1px dashed #60a5fa; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>AnalizaFut 🧠</h1>
    <div id="contenedor">Cargando partidos...</div>

    <script>
        const API_URL = "https://analizafut.onrender.com/api/predicciones";

        async function cargar() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const cont = document.getElementById("contenedor");
                cont.innerHTML = "";

                data.forEach(m => {
                    const card = document.createElement("div");
                    card.className = "card";
                    
                    let body = m.resultadoReal 
                        ? `<div class="marcador" style="border-color:#10b981; color:#10b981;">🏁 Resultado: ${m.resultadoReal}</div>`
                        : `<div class="bar-wrapper"><div class="bar-fill home" style="width:${m.prediccion.percent.home}%"></div><div class="bar-text"><span>Gana ${m.teams.home}</span><span>${m.prediccion.percent.home}%</span></div></div>
                           <div class="bar-wrapper"><div class="bar-fill draw" style="width:${m.prediccion.percent.draw}%"></div><div class="bar-text"><span>Empate</span><span>${m.prediccion.percent.draw}%</span></div></div>
                           <div class="bar-wrapper"><div class="bar-fill away" style="width:${m.prediccion.percent.away}%"></div><div class="bar-text"><span>Gana ${m.teams.away}</span><span>${m.prediccion.percent.away}%</span></div></div>
                           <div class="marcador">🎯 Marcador Probable: ${m.prediccion.score}</div>`;

                    card.innerHTML = `<div class="equipos-row"><span>${m.teams.home}</span><span>VS</span><span>${m.teams.away}</span></div>${body}`;
                    cont.appendChild(card);
                });
            } catch (e) { 
                document.getElementById("contenedor").innerHTML = "Error al conectar al servidor."; 
                console.error(e);
            }
        }
        cargar();
    </script>
</body>
</html>
