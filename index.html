<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnalizaFut - Centro de Predicciones</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f1a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00ffcc;
        }
        /* Estilos de las Pestañas */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab-button {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            background-color: #2c2c3e;
            color: white;
        }
        /* Contenedor de Partidos */
        #contenedor-partidos {
            margin-bottom: 30px;
        }
        .partido-card {
            background: #1e1e2f;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AnalizaFut ⚽</h1>
    
    <div class="tabs-container">
        <button id="btn-mundial" class="tab-button" onclick="cambiarTab('mundial')" style="background-color: #00ffcc; color: #0f0f1a;">🏆 Mundial 2026</button>
        <button id="btn-clubes" class="tab-button" onclick="cambiarTab('clubes')">⚽ Ligas Regulares</button>
    </div>

    <div id="contenedor-partidos"></div>
</div>

<script>
    let tabActual = 'mundial'; // Pestaña por defecto

    async function cargarCartelera() {
        const contenedor = document.getElementById('contenedor-partidos');
        contenedor.innerHTML = '<p style="color: white; text-align: center;">Buscando partidos en los servidores centrales...</p>';

        try {
            // Petición dinámica según la pestaña activa
            const respuesta = await fetch(`https://analizafut.onrender.com/api/predicciones/${tabActual}`);
            const datos = await respuesta.json();
            
            contenedor.innerHTML = ''; // Limpiar el mensaje de carga
            
            if (!datos.partidos || datos.partidos.length === 0) {
                contenedor.innerHTML = '<p style="color: #ccc; text-align: center;">No hay partidos programados para hoy en esta sección.</p>';
                return;
            }

            datos.partidos.forEach(partido => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'partido-card';
                
                // Detectar si el partido ya finalizó según los datos de tu backend blindado
                const esFinalizado = partido.fixture.status === "Match Finished" || partido.predictionData.correct_score === "Finalizado";
                
                const marcadorHtml = esFinalizado 
                    ? `<div style="color: #ffcc00; font-weight: bold; font-size: 20px; margin: 10px 0;">Resultado Real: ${partido.predictionData.resultadoReal}</div>`
                    : `<div style="color: #00ffcc; font-weight: bold; margin: 10px 0;">Predicción: ${partido.predictionData.predictions.correct_score}</div>`;

                tarjeta.innerHTML = `
                    <div style="font-size: 11px; color: #888; text-align: center; margin-bottom: 8px;">Estado: ${partido.fixture.status}</div>
                    <div style="display: flex; justify-content: space-around; align-items: center;">
                        <div style="text-align: center; width: 42%;">
                            <img src="${partido.teams.home.logo}" alt="${partido.teams.home.name}" style="width: 35px; height: auto; error: this.src='https://via.placeholder.com/40';"><br>
                            <strong style="font-size: 14px;">${partido.teams.home.name}</strong>
                            <div style="font-size: 12px; color: #aaa; margin-top: 4px;">Gana: ${partido.predictionData.predictions.percent.home}</div>
                        </div>
                        <div style="font-weight: bold; font-size: 16px; color: #666;">VS</div>
                        <div style="text-align: center; width: 42%;">
                            <img src="${partido.teams.away.logo}" alt="${partido.teams.away.name}" style="width: 35px; height: auto; error: this.src='https://via.placeholder.com/40';"><br>
                            <strong style="font-size: 14px;">${partido.teams.away.name}</strong>
                            <div style="font-size: 12px; color: #aaa; margin-top: 4px;">Gana: ${partido.predictionData.predictions.percent.away}</div>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 12px; border-top: 1px solid #2a2a3d; padding-top: 8px;">
                        ${marcadorHtml}
                        <div style="font-size: 11px; color: #666;">Probabilidad de Empate: ${partido.predictionData.predictions.percent.draw}</div>
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });

        } catch (error) {
            contenedor.innerHTML = '<p style="color: #ff4d4d; text-align: center;">Error al conectar con la cartelera automatizada.</p>';
        }
    }

    function cambiarTab(tipo) {
        tabActual = tipo;
        
        // Resetear estilos de botones
        document.getElementById('btn-mundial').style.backgroundColor = '#2c2c3e';
        document.getElementById('btn-mundial').style.color = 'white';
        document.getElementById('btn-clubes').style.backgroundColor = '#2c2c3e';
        document.getElementById('btn-clubes').style.color = 'white';
        
        // Activar el seleccionado
        const btnActivo = tipo === 'mundial' ? document.getElementById('btn-mundial') : document.getElementById('btn-clubes');
        if (btnActivo) {
            btnActivo.style.backgroundColor = '#00ffcc';
            btnActivo.style.color = '#0f0f1a';
        }
        
        cargarCartelera();
    }

    // Carga inicial al abrir la app
    document.addEventListener('DOMContentLoaded', cargarCartelera);
</script>
</body>
</html>
